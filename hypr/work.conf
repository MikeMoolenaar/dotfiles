monitor = , preferred, auto, auto

workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2, default:true
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2

exec-once = hyprctl dispatch exec [workspace 1 silent] firefox
exec-once = hyprctl dispatch exec [workspace 2 silent] slack 
exec-once = hyprctl dispatch exec [workspace 8 silent] alacritty 
exec-once = hyprctl dispatch exec [workspace 9 silent] ~/.local/share/JetBrains/Toolbox/apps/rider/bin/rider ~/git/ngSneleentaxi/Sneleentaxi.sln

windowrule {
  name = firefox
  match:class = firefox

  workspace = 1
}

windowrule {
  name = slack
  match:class = slack

  workspace = 2
}

windowrule {
  name = alacritty
  match:class = alacritty

  workspace = 8
}

windowrule {
  name = rider
  match:class = jetbrains-rider

  workspace = 9
}


